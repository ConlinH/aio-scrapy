[tox]
requires =
    tox>=4.21
env_list =
    py39
    py310
    py311
    py312
    py313
    py314
skip_missing_interpreters = false

[testenv]
description = Run tests on {base_python} / 使用{base_python}运行测试
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=8
    pytest-asyncio>=0.23
commands =
    python -m pytest {posargs:-q}

# Bind each environment to the local interpreter command explicitly.
# 将每个环境显式绑定到本机解释器命令，避免tox自动发现错误版本。
[testenv:py39]
base_python = python39

[testenv:py310]
base_python = python310

[testenv:py311]
base_python = python311

[testenv:py312]
base_python = python312

[testenv:py313]
base_python = python313

[testenv:py314]
base_python = python314
